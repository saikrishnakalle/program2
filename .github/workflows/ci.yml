name: CI Pipeline

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: "Test file"
        default: "test_decimal.py"
      program_file:
        description: "Program file"
        default: "app.py"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install pytest
      - run: python ${{ github.event.inputs.program_file }}
      - run: pytest ${{ github.event.inputs.test_file }} -v
